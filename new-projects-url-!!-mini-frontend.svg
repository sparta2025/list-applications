<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">

<defs>
  <style><![CDATA[

    /* ===== GLOBAL ===== */
    .card, .btn, .header-link {
      cursor: pointer;
      transition: all 0.18s ease;
      transform-origin: center;
    }

    /* ===== HOVER ===== */
    .card:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0px 10px 18px rgba(0,0,0,0.45));
    }

    .btn:hover {
      transform: scale(1.03);
      filter: brightness(1.25);
    }

    /* ===== ACTIVE STATE (pseudo router) ===== */
    .card:target {
      stroke: #58a6ff !important;
      filter: drop-shadow(0px 0px 18px rgba(88,166,255,0.45));
      transform: scale(1.01);
    }

    /* ===== RIPPLE EFFECT ===== */
    .ripple {
      position: relative;
      overflow: visible;
    }

    .ripple:active::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(88,166,255,0.6);
      animation: rippleAnim 0.6s ease-out;
    }

    @keyframes rippleAnim {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(18); opacity: 0; }
    }

    /* text glow */
    text:hover {
      fill-opacity: 0.85;
    }

  ]]></style>
</defs>

<!-- BACKGROUND -->
<rect width="680" height="420" fill="#0d1117" rx="12"/>
<rect x="0" y="0" width="680" height="4" rx="2" fill="#238636"/>

