  <text x="68" y="32" font-size="12" fill="#58a6ff">github.com</text>
  <text x="68" y="48" font-size="14" font-weight="600" fill="#f0f6fc">/sparta2025</text>
</a>

<rect x="580" y="20" width="64" height="24" rx="12" fill="#1f6feb" opacity="0.2"/>
